<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulář by J. Teixeira</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
  
  <style>
   
    </style>
  <style>
    body{
        background: rgb(1, 93, 129)
    }
    form {
        background: rgb(2, 62, 228);
        padding: 12px;
        font-family: "Oswald";
        font-size: 32px;
        border-radius: 24px;
        text-align: left;
    }
    form p {
        background: rgb(0, 173, 253);
        padding: 12px;
        margin: 24px 0;
    }
    input {
        font-size: 24px;
    }
    label {
        min-width: 320px;
        display: inline-block;
    }
    .tlacitko {
        background: black;
        color: white;
        padding: 16px 32px;
        border-radius: 8px;
        transition: all 0.3s ease;
        cursor: pointer;
    }
    .tlacitko:hover{
        scale: 1.2;
    }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <a class="odkaz odkaz-zpet" href="index.html">Zpět na hl. stránku</a>
<p>
    Lorem Ipsum je standardní pseudolatinský výplňový text používaný od 16. století v grafickém designu a tisku. Slouží jako zástupný text (dummy text) k demonstraci rozložení typografie a vizuálního stylu bez rušení čitelným obsahem.
</p>
    <form>
        <p>
            <label for="jmeno">Jméno</label>
            <input type="text" name="jmeno" id="jmeno" required>
        </p>
        <p>
            <label for="sleep">Dnes jsem se dobře vyspal</label>
            <input type="checkbox" name="sleep" id="sleep" required>
        </p>
        <p>
            <label for="mood">Moje dnešní nálada</label>
            mizerná
            <input type="radio" name="mood" value="5">
            <input type="radio" name="mood" value="4">
            <input type="radio" name="mood" value="3">
            <input type="radio" name="mood" value="2">
            <input type="radio" name="mood" value="1">
            úžasná
        </p>
        <p>
            <label for="file">Foto</label>
            <input type="file" name="file" id="file" required>
        </p>
        <p>
            <label for="color">oblíbená barva</label>
            <input type="color" name="color" id="color" required>
        </p>
        <p>
            <label for="date">Datum Narození</label>
            <input type="date" name="date" id="date" required>
        </p>
        <p>
            <label for="číslo">Číslo</label>
            <input type="number" name="číslo" id="číslo" required>
        </p>
        <p>
            <label for="password">Heslo</label>
            <input type="password" name="password" id="password" required>
        </p>
        <input class="tlacitko" type="submit" value="Poptat">
        <input class="tlacitko" type="reset" value="smazat vše">
        <input type="hidden" name="secret" value="123456xxx">
    </form>
 
</body>
</html>
